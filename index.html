<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima Ing. Ismael Trujillo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a5298">

<script src="https://cdnjs.cloudflare.com/ajax/libs/skycons/1396634940/skycons.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  transition: background 0.8s ease;
}

.app {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

h1 {
  text-align: center;
}

#fechaHora {
  text-align: center;
  margin-bottom: 10px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 10px;
}

/* BOTÓN INSTALAR */
#btnInstalar {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 12px;
  background: #2ecc71;
  color: white;
  font-size: 16px;
  margin-bottom: 15px;
  display: none;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
}

.temp {
  font-size: 50px;
  font-weight: bold;
}

/* PRONÓSTICO */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.mini-card {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="app">

<h1>🌤️ Clima Ing. Ismael Trujillo</h1>
<p id="fechaHora"></p>

<input type="text" id="buscador" placeholder="Buscar ciudad...">

<button id="btnInstalar">📲 Instalar App</button>

<div id="climaUsuario"></div>

</div>

<script>

const API_KEY = "a03fddc3b16c43218ca182151252004";

/* FECHA */
function actualizarFechaHora() {
  document.getElementById("fechaHora").innerText =
    new Date().toLocaleString("es-MX");
}
setInterval(actualizarFechaHora, 1000);

/* FONDO */
function cambiarFondo(condicion, esDia) {
  condicion = condicion.toLowerCase();

  if (!esDia) {
    document.body.style.background = "linear-gradient(135deg,#0f2027,#203a43,#2c5364)";
  } else if (condicion.includes("soleado")) {
    document.body.style.background = "linear-gradient(135deg,#56ccf2,#2f80ed)";
  } else if (condicion.includes("nublado")) {
    document.body.style.background = "linear-gradient(135deg,#757f9a,#d7dde8)";
  } else if (condicion.includes("lluvia")) {
    document.body.style.background = "linear-gradient(135deg,#232526,#414345)";
  } else {
    document.body.style.background = "linear-gradient(135deg,#1e3c72,#2a5298)";
  }
}

/* ICONO */
function obtenerIcono(condicion, esDia) {
  if (!esDia) return "CLEAR_NIGHT";
  if (condicion.includes("soleado")) return "CLEAR_DAY";
  if (condicion.includes("nublado")) return "CLOUDY";
  if (condicion.includes("lluvia")) return "RAIN";
  return "PARTLY_CLOUDY_DAY";
}

/* MOSTRAR CLIMA */
function mostrarClima(ciudad, data) {

  cambiarFondo(data.current.condition.text, data.current.is_day);

  document.getElementById("climaUsuario").innerHTML = `
    <div class="card">
      <h2>${ciudad}</h2>
      <canvas id="iconoClima" width="80" height="80"></canvas>
      <div class="temp">${data.current.temp_c}°C</div>
      <div>${data.current.condition.text}</div>

      <p>
        💧 Lluvia: ${data.forecast.forecastday[0].day.daily_chance_of_rain}%<br>
        💨 Viento: ${data.current.wind_kph} km/h<br>
        🌡️ Sensación: ${data.current.feelslike_c}°C
      </p>
    </div>
  `;

  const skycons = new Skycons({ color: "white" });
  const icono = obtenerIcono(data.current.condition.text, data.current.is_day);
  skycons.add("iconoClima", Skycons[icono]);
  skycons.play();

  mostrarPronostico(data);
}

/* PRONÓSTICO */
function mostrarPronostico(data) {

  let html = "<div class='grid'>";

  data.forecast.forecastday.forEach(dia => {

    let fecha = new Date(dia.date).toLocaleDateString("es-MX", {
      weekday: "short"
    });

    html += `
      <div class="mini-card">
        <strong>${fecha}</strong><br>
        ${dia.day.maxtemp_c}° / ${dia.day.mintemp_c}°<br>
        💧 ${dia.day.daily_chance_of_rain}%
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("climaUsuario").innerHTML += html;
}

/* UBICACIÓN */
function obtenerUbicacion() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    let url = `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${pos.coords.latitude},${pos.coords.longitude}&days=3&lang=es`;
    let res = await fetch(url);
    let data = await res.json();
    mostrarClima(data.location.name, data);
  });
}

/* BUSCADOR OPTIMIZADO */
let timeout;

document.getElementById("buscador").addEventListener("keyup", (e) => {

  clearTimeout(timeout);

  timeout = setTimeout(async () => {

    let ciudad = e.target.value.trim();

    if (ciudad.length < 3) return;

    try {
      let url = `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${ciudad}&days=3&lang=es`;

      let res = await fetch(url);

      if (!res.ok) throw new Error("Error API");

      let data = await res.json();

      if (data.error) return;

      mostrarClima(data.location.name, data);

    } catch (error) {
      console.log(error);
    }

  }, 800);
});

/* BOTÓN INSTALAR */
let deferredPrompt;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById("btnInstalar").style.display = "block";
});

document.getElementById("btnInstalar").addEventListener("click", async () => {
  if (deferredPrompt) {
    deferredPrompt.prompt();
    deferredPrompt = null;
  }
});

/* INICIO */
obtenerUbicacion();

</script>

</body>
</html>
