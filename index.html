<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clima Ing. Ismael Trujillo</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2a5298">

<script src="https://cdnjs.cloudflare.com/ajax/libs/skycons/1396634940/skycons.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  color: white;
  display: flex;
  justify-content: center;
  transition: background 0.8s ease;
}

.app {
  width: 100%;
  max-width: 400px;
  padding: 20px;
}

h1 {
  text-align: center;
}

#fechaHora {
  text-align: center;
  margin-bottom: 15px;
}

input {
  width: 100%;
  padding: 12px;
  border-radius: 12px;
  border: none;
  margin-bottom: 15px;
}

/* CARD */
.card {
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 20px;
  text-align: center;
}

/* TEMPERATURA */
.temp {
  font-size: 50px;
  font-weight: bold;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-top: 15px;
}

.mini-card {
  background: rgba(255,255,255,0.08);
  padding: 10px;
  border-radius: 10px;
  font-size: 13px;
}
</style>
</head>

<body>

<div class="app">

<h1>🌤️ Clima Ing. Ismael Trujillo</h1>
<p id="fechaHora"></p>

<input type="text" id="buscador" placeholder="Buscar ciudad...">

<div id="climaUsuario"></div>

<div class="grid" id="miniClima"></div>

</div>

<script>

const API_KEY = "TU_API_KEY";

/* FECHA */
function actualizarFechaHora() {
  const ahora = new Date();
  document.getElementById("fechaHora").innerText =
    ahora.toLocaleString("es-MX");
}
setInterval(actualizarFechaHora, 1000);
actualizarFechaHora();

/* FONDO */
function cambiarFondo(condicion, esDia) {
  condicion = condicion.toLowerCase();

  if (!esDia) {
    document.body.style.background = "linear-gradient(135deg,#0f2027,#203a43,#2c5364)";
  } else if (condicion.includes("soleado")) {
    document.body.style.background = "linear-gradient(135deg,#56ccf2,#2f80ed)";
  } else if (condicion.includes("nublado")) {
    document.body.style.background = "linear-gradient(135deg,#757f9a,#d7dde8)";
  } else {
    document.body.style.background = "linear-gradient(135deg,#1e3c72,#2a5298)";
  }
}

/* ICONO */
function obtenerIcono(condicion, esDia) {
  if (!esDia) return "CLEAR_NIGHT";
  if (condicion.includes("soleado")) return "CLEAR_DAY";
  if (condicion.includes("nublado")) return "CLOUDY";
  if (condicion.includes("lluvia")) return "RAIN";
  return "PARTLY_CLOUDY_DAY";
}

/* MOSTRAR CLIMA */
function mostrarClima(ciudad, data) {

  cambiarFondo(data.current.condition.text, data.current.is_day);

  document.getElementById("climaUsuario").innerHTML = `
    <div class="card">
      <h2>${ciudad}</h2>
      <canvas id="iconoClima" width="80" height="80"></canvas>
      <div class="temp">${data.current.temp_c}°C</div>
      <div>${data.current.condition.text}</div>

      <p>
        💧 ${data.forecast.forecastday[0].day.daily_chance_of_rain}%<br>
        💨 ${data.current.wind_kph} km/h<br>
        🌡️ ${data.current.feelslike_c}°C
      </p>
    </div>
  `;

  const skycons = new Skycons({ color: "white" });
  const icono = obtenerIcono(data.current.condition.text, data.current.is_day);
  skycons.add("iconoClima", Skycons[icono]);
  skycons.play();

  mostrarPronostico(data);
}

/* PRONOSTICO */
function mostrarPronostico(data) {

  let html = "<div class='grid'>";

  data.forecast.forecastday.forEach(dia => {

    let fecha = new Date(dia.date).toLocaleDateString("es-MX", {
      weekday: "short"
    });

    html += `
      <div class="mini-card">
        <strong>${fecha}</strong><br>
        ${dia.day.maxtemp_c}° / ${dia.day.mintemp_c}°<br>
        💧 ${dia.day.daily_chance_of_rain}%
      </div>
    `;
  });

  html += "</div>";

  document.getElementById("climaUsuario").innerHTML += html;
}

/* UBICACION */
function obtenerUbicacion() {
  navigator.geolocation.getCurrentPosition(async (pos) => {
    let url = `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${pos.coords.latitude},${pos.coords.longitude}&days=3&lang=es`;
    let res = await fetch(url);
    let data = await res.json();
    mostrarClima(data.location.name, data);
  });
}

/* BUSCADOR */
document.getElementById("buscador").addEventListener("keyup", async (e) => {
  let ciudad = e.target.value;
  if (ciudad.length < 3) return;

  let url = `https://api.weatherapi.com/v1/forecast.json?key=${API_KEY}&q=${ciudad}&days=3&lang=es`;
  let res = await fetch(url);
  let data = await res.json();

  mostrarClima(data.location.name, data);
});

/* MINI */
const miniCiudades = ["Hermosillo","Nogales","Caborca"];

async function cargarMini() {
  let contenedor = document.getElementById("miniClima");

  for (let ciudad of miniCiudades) {
    let url = `https://api.weatherapi.com/v1/current.json?key=${API_KEY}&q=${ciudad}&lang=es`;
    let res = await fetch(url);
    let data = await res.json();

    contenedor.innerHTML += `
      <div class="mini-card">
        ${ciudad}<br>${data.current.temp_c}°
      </div>
    `;
  }
}

/* INICIO */
obtenerUbicacion();
cargarMini();

</script>

</body>
</html>
